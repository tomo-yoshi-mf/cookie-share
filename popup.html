<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cookie Share</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 240px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: #202124;
      background: #fff;
    }

    h1 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-copy {
      width: 100%;
      padding: 10px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-copy:hover {
      background: #1558b0;
    }

    .btn-copy:disabled {
      background: #a8c7fa;
      cursor: not-allowed;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
      color: #188038;
    }

    #status.error {
      color: #d93025;
    }
  </style>
</head>
<body>
  <h1>🍪 Cookie Share</h1>
  <button class="btn-copy" id="copy">Copy Cookies to localhost</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
